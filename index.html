<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Diagnostic</title>
    <style>
        body { 
            background: #ffffff; 
            color: #000000; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            font-size: 22px; 
            font-weight: bold;
            margin: 0; 
            padding: 0;
            height: 100vh;
            overflow: hidden; /* Prevents double scrollbars on body */
        }
        #container {
            width: 100%;
            max-width: 600px; 
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-y: auto; /* Adds manual scroll for contingency */
            scroll-behavior: smooth;
        }
        #log {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Keeps newest messages at the bottom */
        }
        .entry {
            padding: 12px 20px;
            border-bottom: 2px solid #f1f5f9;
            display: flex;
            flex-direction: column;
        }
        .time { 
            color: #94a3b8; 
            font-family: monospace; 
            font-size: 12px; 
            margin-bottom: 4px;
        }
        .msg { 
            line-height: 1.2;
            word-wrap: break-word;
        }
        #cursor { color: #e2e8f0; padding: 20px; font-size: 30px; animation: blink 1s infinite;}
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div id="container" id="scroll-zone">
        <div id="log"></div>
        <div id="cursor">_</div>
    </div>

    <script>
        const token = '8616153416:AAHYp4lkOetXogz_ebqZPn1lXhUZLCjHAyY';
        let lastId = 0;
        const processedIds = new Set(); 
        const container = document.getElementById('container');

        async function fetchLogs() {
            try {
                const r = await fetch(`https://api.telegram.org/bot${token}/getUpdates?offset=${lastId + 1}`);
                const d = await r.json();
                if (d.result && d.result.length > 0) {
                    d.result.forEach(u => {
                        if (u.message && u.message.text && !processedIds.has(u.update_id)) {
                            const div = document.createElement('div');
                            div.className = 'entry';
                            const timeStr = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
                            div.innerHTML = `<span class="time">${timeStr}</span><span class="msg">${u.message.text}</span>`;
                            document.getElementById('log').appendChild(div);
                            
                            processedIds.add(u.update_id); 
                            lastId = u.update_id;
                            
                            // Auto-scroll to bottom
                            container.scrollTop = container.scrollHeight;
                        }
                    });
                }
            } catch (e) {}
        }
        
        setInterval(fetchLogs, 1500); 

        if ('wakeLock' in navigator) {
            navigator.wakeLock.request('screen').catch(()=>{});
        }
    </script>
</body>
</html>
