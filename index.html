<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ghost Shield • Elite</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        :root {
            --accent-glow: rgba(48, 209, 88, 0.4);
            --accent-solid: #30d158;
            --bg-base: #030305;
        }

        * {
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-base);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            /* High-End Deep Background */
            background-image: radial-gradient(circle at 50% 0%, #121216 0%, var(--bg-base) 70%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        /* Animated Grain Texture */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 50;
            opacity: 0.6;
        }

        /* Ambient Glow Orbs */
        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            z-index: 0;
            pointer-events: none;
            opacity: 0.4;
        }
        .orb-1 { top: -10%; right: -10%; width: 300px; height: 300px; background: radial-gradient(circle, rgba(48,209,88,0.15), transparent 70%); }
        .orb-2 { bottom: -20%; left: -10%; width: 350px; height: 350px; background: radial-gradient(circle, rgba(0,119,255,0.08), transparent 70%); }

        /* Elite Glass Panel */
        .glass-panel {
            background: rgba(20, 20, 23, 0.5);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            position: relative;
            z-index: 10;
        }

        /* Shiny Text Effects */
        .shiny-silver {
            background: linear-gradient(120deg, #888 0%, #ddd 35%, #fff 50%, #ddd 65%, #888 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
        }
        
        .shiny-emerald {
            background: linear-gradient(120deg, #1aa345 0%, #30d158 35%, #81f49e 50%, #30d158 65%, #1aa345 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3.5s linear infinite;
            filter: drop-shadow(0 0 12px rgba(48, 209, 88, 0.2));
        }

        @keyframes shine { to { background-position: 200% center; } }

        /* Status Radar Dot */
        .radar-dot {
            position: relative;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #52525b;
            transition: all 0.3s ease;
        }
        
        .status-active .radar-dot {
            background: var(--accent-solid);
            box-shadow: 0 0 10px var(--accent-solid);
        }

        .status-active .radar-dot::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 1px solid var(--accent-solid);
            animation: radar-pulse 2s cubic-bezier(0.45, 0, 0.55, 1) infinite;
        }

        @keyframes radar-pulse {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        /* Premium Monospace ID Box */
        .id-container {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 2px 15px rgba(0,0,0,0.5);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .id-container:hover {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5), inset 0 2px 15px rgba(0,0,0,0.5);
        }

        .id-container:active {
            transform: translateY(1px) scale(0.98);
        }

        .id-container::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
            transform: skewX(-20deg);
            transition: 0.5s;
        }

        .id-container:hover::before {
            left: 150%;
            transition: 0.7s ease-in-out;
        }

        /* Refresh Button SVG Animation */
        .refresh-btn svg {
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .refresh-btn:active svg {
            transform: rotate(180deg) scale(0.8);
        }
        .is-refreshing svg {
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .hide-text { opacity: 0; transform: translateY(10px); }
    </style>
</head>
<body>

    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>

    <div id="app-container" class="glass-panel w-full max-w-[420px] rounded-[32px] p-8 flex flex-col items-center opacity-0 translate-y-8">
        
        <div class="w-16 h-16 rounded-full bg-gradient-to-b from-zinc-800 to-zinc-950 flex items-center justify-center border border-zinc-700/50 shadow-[0_0_20px_rgba(48,209,88,0.1)] mb-6 relative group">
            <div class="absolute inset-0 rounded-full bg-[#30d158] opacity-0 group-hover:opacity-10 transition-opacity duration-500 blur-md"></div>
            <svg class="w-7 h-7 text-zinc-300" id="shield-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" class="hidden" id="check-path"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" id="shield-path"/>
            </svg>
        </div>

        <div class="text-center mb-8 w-full">
            <h1 class="text-3xl font-bold tracking-tight mb-1 flex flex-col gap-1">
                <span class="shiny-silver">GHOST SHIELD</span>
                <span class="shiny-emerald text-[11px] tracking-[0.4em] uppercase">System ID</span>
            </h1>
            <p id="instruction" class="text-zinc-500 text-xs mt-4 font-medium tracking-wide">
                Initialize bot with <span class="text-zinc-300 font-bold bg-white/5 px-2 py-0.5 rounded border border-white/10">/start</span>
            </p>
        </div>

        <div class="w-full flex items-center justify-between bg-black/40 border border-white/5 rounded-full px-4 py-2.5 mb-6 backdrop-blur-md">
            <div id="status-container" class="flex items-center gap-3">
                <div class="radar-dot"></div>
                <span id="status-text" class="text-[10px] text-zinc-500 font-bold uppercase tracking-[0.2em] transition-colors duration-300">Listening...</span>
            </div>
            
            <button id="manual-refresh" class="refresh-btn p-1.5 rounded-full hover:bg-white/10 text-zinc-500 hover:text-zinc-300 transition-colors focus:outline-none">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
            </button>
        </div>

        <div id="id-box" class="id-container w-full h-[88px] rounded-2xl flex items-center justify-center cursor-pointer group mb-4">
            <div class="absolute inset-0 flex items-center justify-center">
                <span id="id-text" class="text-2xl font-bold text-zinc-600 tracking-[0.2em] transition-all duration-300">WAITING</span>
            </div>
            <div id="copy-success" class="absolute inset-0 bg-[#30d158]/10 backdrop-blur-sm flex items-center justify-center opacity-0 pointer-events-none border border-[#30d158]/30 rounded-2xl">
                <span class="text-[#30d158] text-sm font-bold tracking-[0.2em] flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg>
                    COPIED
                </span>
            </div>
        </div>

        <div class="flex items-center gap-2 text-[10px] font-medium text-zinc-600 tracking-widest uppercase mt-2">
            <svg class="w-3 h-3 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.042 21.672 13.684 16.6m0 0-2.51 2.225.569-9.47 5.227 7.917-3.286-.672ZM12 2.25V4.5m5.834.166-1.591 1.591M20.25 10.5H18M7.757 14.743l-1.59 1.59M6 10.5H3.75m4.007-4.243-1.59-1.59" />
            </svg>
            <span id="helper-text">Click ID Box to Copy</span>
        </div>

    </div>

    <script>
        // ---------- CONFIGURATION ----------
        const TOKEN = '8616153416:AAHYp4lkOetXogz_ebqZPn1lXhUZLCjHAyY';
        const BASE_URL = `https://api.telegram.org/bot${TOKEN}/getUpdates`;
        
        // Initialize Telegram Web App SDK
        const tg = window.Telegram.WebApp;
        
        let currentChatId = null;
        let pollingInterval = null;
        
        // ---------- DOM ELEMENTS ----------
        const idText = document.getElementById('id-text');
        const idBox = document.getElementById('id-box');
        const statusContainer = document.getElementById('status-container');
        const statusText = document.getElementById('status-text');
        const refreshBtn = document.getElementById('manual-refresh');
        const instruction = document.getElementById('instruction');
        const shieldPath = document.getElementById('shield-path');
        const checkPath = document.getElementById('check-path');

        // ---------- INITIAL ANIMATION ----------
        window.addEventListener('load', () => {
            tg.expand(); // Make it full screen in Telegram
            tg.ready();
            
            gsap.to("#app-container", {
                opacity: 1,
                y: 0,
                duration: 1.2,
                ease: "expo.out",
                delay: 0.2
            });
        });

        // ---------- UI STATE MANAGERS ----------
        function setConnectedState(id) {
            if (!id) return;
            currentChatId = id;
            
            // Update Text
            idText.innerText = id;
            idText.classList.remove('text-zinc-600', 'tracking-[0.2em]');
            idText.classList.add('text-zinc-100', 'tracking-widest');
            
            // Update Status Bar
            statusContainer.classList.add('status-active');
            statusText.innerText = "LINK ESTABLISHED";
            statusText.classList.replace('text-zinc-500', 'text-[#30d158]');

            // Update Instructions
            if(instruction.innerHTML.includes('/start')) {
                gsap.to(instruction, {opacity: 0, y: -5, duration: 0.3, onComplete: () => {
                    instruction.innerHTML = 'System Active. Ready for config.';
                    instruction.classList.replace('text-zinc-500', 'text-zinc-400');
                    gsap.to(instruction, {opacity: 1, y: 0, duration: 0.3});
                }});
            }

            // Shield Icon Glow Up
            gsap.to(shieldPath, { stroke: "#30d158", duration: 0.5 });
            
            // Pop Animation for Box
            gsap.fromTo(idBox, 
                { scale: 0.95, borderColor: "rgba(48, 209, 88, 0.5)" }, 
                { scale: 1, borderColor: "rgba(255, 255, 255, 0.08)", duration: 0.8, ease: "elastic.out(1, 0.5)" }
            );
        }

        function showTempStatus(msg, isError = false) {
            const originalText = statusText.innerText;
            const originalColor = statusText.className;
            
            gsap.to(statusText, {opacity: 0, duration: 0.2, onComplete: () => {
                statusText.innerText = msg;
                statusText.className = `text-[10px] font-bold uppercase tracking-[0.2em] ${isError ? 'text-red-400' : 'text-zinc-300'}`;
                gsap.to(statusText, {opacity: 1, duration: 0.2});
            }});

            setTimeout(() => {
                gsap.to(statusText, {opacity: 0, duration: 0.2, onComplete: () => {
                    statusText.innerText = originalText;
                    statusText.className = originalColor;
                    gsap.to(statusText, {opacity: 1, duration: 0.2});
                }});
            }, 2000);
        }

        // ---------- HYBRID LOGIC ----------
        async function syncSystem() {
            // 1. ELITE METHOD: Use the SDK (Instant & Private to each user)
            const user = tg.initDataUnsafe?.user;
            if (user && user.id) {
                setConnectedState(user.id);
                return;
            }

            // 2. FALLBACK: Polling (If opened in external browser)
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 8000);
                const response = await fetch(BASE_URL + '?limit=1&timeout=0', { 
                    signal: controller.signal,
                    headers: { 'Cache-Control': 'no-cache' }
                });
                clearTimeout(timeoutId);
                
                const data = await response.json();
                if (data.ok && data.result && data.result.length > 0) {
                    const lastUpdate = data.result[data.result.length - 1];
                    // Updated to safely catch message, edited_message, or channel_post ID
                    const chatId = lastUpdate.message?.chat?.id || lastUpdate.edited_message?.chat?.id || lastUpdate.channel_post?.chat?.id;
                    
                    if (chatId) setConnectedState(chatId);
                }
            } catch (err) {
                if (err.name !== 'AbortError') showTempStatus('Sync Error', true);
            }
        }

        // ---------- INTERACTIONS ----------
        
        // Manual Refresh
        refreshBtn.addEventListener('click', async () => {
            if(refreshBtn.classList.contains('is-refreshing')) return;
            refreshBtn.classList.add('is-refreshing');
            await syncSystem();
            setTimeout(() => refreshBtn.classList.remove('is-refreshing'), 600);
        });

        // Click to Copy
        idBox.addEventListener('click', () => {
            if (!currentChatId) {
                gsap.fromTo(idBox, {x: -5}, {x: 5, duration: 0.05, yoyo: true, repeat: 5, onComplete: () => gsap.set(idBox, {x:0})});
                showTempStatus('NO ID FOUND', true);
                return;
            }

            navigator.clipboard.writeText(String(currentChatId)).then(() => {
                tg.HapticFeedback?.notificationOccurred('success');
                const tl = gsap.timeline();
                
                tl.to(idText, { opacity: 0, scale: 0.9, duration: 0.2 })
                  .to("#copy-success", { opacity: 1, duration: 0.2 }, "-=0.1")
                  .to(shieldPath, { opacity: 0, duration: 0.2 }, "-=0.4")
                  .to(checkPath, { display: "block", opacity: 1, stroke: "#30d158", duration: 0.2 }, "-=0.2");

                setTimeout(() => {
                    const tlRevert = gsap.timeline();
                    tlRevert.to("#copy-success", { opacity: 0, duration: 0.3 })
                            .to(idText, { opacity: 1, scale: 1, duration: 0.3 }, "-=0.2")
                            .to(checkPath, { opacity: 0, duration: 0.2, onComplete: () => checkPath.style.display = "none" }, "-=0.3")
                            .to(shieldPath, { opacity: 1, duration: 0.2 }, "-=0.1");
                }, 1500);
            }).catch(() => {
                showTempStatus('COPY FAILED', true);
            });
        });

        // ---------- INITIALIZATION ----------
        syncSystem();
        pollingInterval = setInterval(() => {
            if (document.visibilityState === 'visible') syncSystem();
        }, 2000);
    </script>
</body>
</html>
